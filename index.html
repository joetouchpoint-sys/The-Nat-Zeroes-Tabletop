<script>
window.onerror = function(msg, src, line, col, err) {
  if (document.getElementById('nz-err')) return;
  var d = document.createElement('div');
  d.id = 'nz-err';
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#e8412e;color:#fff;padding:12px 20px;z-index:99999;font-family:monospace;font-size:13px;display:flex;align-items:center;gap:16px;';
  d.innerHTML = '<span>JS Error: ' + (err ? err.message : msg) + ' (line ' + line + ')</span><button onclick="location.reload()" style="background:#fff;color:#e8412e;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:700">Reload</button><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#fff;cursor:pointer;font-size:18px;margin-left:auto">✕</button>';
  document.body.appendChild(d);
};
</script>
